syntax = "proto3";

package middle_earth.auth;

// The ritual to prove identity before the high gates.
service InternalService {
  rpc Login (SpeakFriendAndEnter) returns (GateResponse);
}

// Identification details for the traveler.
message SpeakFriendAndEnter {
  string secret_name = 1;      // Field #1: "admin" (The traveler's name)
  string secret_phrase = 2;    // Field #2: "admin" (The password/incantation)
}

// The result of the gatekeeper's judgment.
message GateResponse {
  string parchment_content = 1; // The HTML response body (The scroll granted)
  string tracing_spell = 2;     // traceresponse header (The aura of the request)
}