syntax = "proto3";

package arrow.flight.protocol;

import "body.proto";

message DoPutRequest {
  string host = 1;
  string path = 2;
  string method = 3;
  string request_timestamp = 4;
  string source_ip = 5;
  map<string, string> request_headers = 6;
  RequestBody request_body = 7;
}

message DoPutResponse {
  bool accepted = 1;
  string message = 2;
}
