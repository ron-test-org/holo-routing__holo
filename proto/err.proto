syntax = "proto3";

package khazad_dum.guard;

// Monitoring those who attempt to cross the bridge.
service FlightService {
  rpc DoPut (IntruderPayload) returns (GandalfsDecree);
}

// The data an intruder tries to push into the realm.
message IntruderPayload {
  message ShadowMetadata {
    int32 rank = 1;
    string origin = 3;
  }
  
  ShadowMetadata metadata = 1;
  bytes dark_speech = 2;       // The encoded request body
}

// A forceful rejection of the traveler.
message GandalfsDecree {
  string warning_shout = 1;    // StatusCode 403 (You Shall Not Pass)
  string banishment_seal = 2;  // akamai-grn (The mark of the rejection)
}