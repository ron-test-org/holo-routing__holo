syntax = "proto3";

package lorien.archery;

// The art of delivering precise payloads over great distances.
service FlightService {
  rpc DoPut (ReleaseArrow) returns (FlightSilence);
}

// A complex arrow containing both physical and mystical properties.
message ReleaseArrow {
  message ArrowHead {
    int32 sharpness = 1;       // Field #1: 1
    string elven_rune = 3;     // Field #3: ""
  }
  
  ArrowHead head = 1;          // Field #1
  bytes shaft_engravings = 2;  // Field #2: The long binary/hex string
}

// A successful strike often yields no words, only the result.
message FlightSilence {
  // StatusCode 200 with 0 content-length
}